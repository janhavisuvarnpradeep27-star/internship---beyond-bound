<svg width="900" height="1200" viewBox="0 0 900 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Single Glycomics bottle">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f6f8"/>
      <stop offset="100%" stop-color="#e8edf1"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8e5d41"/>
      <stop offset="100%" stop-color="#5d3a29"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3128"/>
      <stop offset="100%" stop-color="#2d1c17"/>
    </linearGradient>
    <linearGradient id="label" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f7f85"/>
      <stop offset="100%" stop-color="#0f5f66"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="170%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)"/>

  <g transform="translate(190,90)" filter="url(#shadow)">
    <rect x="0" y="80" width="520" height="930" rx="85" fill="url(#glass)"/>
    <rect x="-8" y="0" width="536" height="165" rx="42" fill="url(#cap)"/>

    <!-- subtle cap grooves -->
    <g opacity="0.25" stroke="#F9F9F9" stroke-width="2">
      <line x1="35" y1="18" x2="35" y2="145"/>
      <line x1="55" y1="18" x2="55" y2="145"/>
      <line x1="75" y1="18" x2="75" y2="145"/>
      <line x1="95" y1="18" x2="95" y2="145"/>
      <line x1="115" y1="18" x2="115" y2="145"/>
      <line x1="135" y1="18" x2="135" y2="145"/>
      <line x1="155" y1="18" x2="155" y2="145"/>
      <line x1="175" y1="18" x2="175" y2="145"/>
      <line x1="195" y1="18" x2="195" y2="145"/>
      <line x1="215" y1="18" x2="215" y2="145"/>
      <line x1="235" y1="18" x2="235" y2="145"/>
      <line x1="255" y1="18" x2="255" y2="145"/>
      <line x1="275" y1="18" x2="275" y2="145"/>
      <line x1="295" y1="18" x2="295" y2="145"/>
      <line x1="315" y1="18" x2="315" y2="145"/>
      <line x1="335" y1="18" x2="335" y2="145"/>
      <line x1="355" y1="18" x2="355" y2="145"/>
      <line x1="375" y1="18" x2="375" y2="145"/>
      <line x1="395" y1="18" x2="395" y2="145"/>
      <line x1="415" y1="18" x2="415" y2="145"/>
      <line x1="435" y1="18" x2="435" y2="145"/>
      <line x1="455" y1="18" x2="455" y2="145"/>
      <line x1="475" y1="18" x2="475" y2="145"/>
    </g>

    <rect x="34" y="365" width="452" height="505" rx="35" fill="url(#label)"/>

    <text x="260" y="560" text-anchor="middle" fill="#E6FFFF" font-size="38" font-family="Arial, sans-serif" font-weight="700">BEYOND BOUND</text>
    <text x="260" y="645" text-anchor="middle" fill="#F6FFFE" font-size="92" font-family="Georgia, serif" font-weight="700">Glycomics</text>
    <text x="260" y="708" text-anchor="middle" fill="#E6FFFF" font-size="31" font-family="Arial, sans-serif">Natural Formulation for</text>
    <text x="260" y="750" text-anchor="middle" fill="#E6FFFF" font-size="31" font-family="Arial, sans-serif">Healthy Glucose Metabolism</text>
  </g>
</svg>
