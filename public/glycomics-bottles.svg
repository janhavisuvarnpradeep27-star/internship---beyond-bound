<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Glycomics supplement bottles illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9f7f6"/>
      <stop offset="100%" stop-color="#d4eceb"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a5b3f"/>
      <stop offset="100%" stop-color="#5f3a28"/>
    </linearGradient>
    <linearGradient id="label" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f7a7f"/>
      <stop offset="100%" stop-color="#165e63"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <g transform="translate(110 110)" filter="url(#shadow)">
    <rect x="20" y="40" width="320" height="540" rx="48" fill="url(#glass)"/>
    <rect x="10" y="0" width="340" height="86" rx="24" fill="#3f2a22"/>
    <rect x="44" y="236" width="272" height="250" rx="24" fill="url(#label)"/>
    <text x="180" y="308" text-anchor="middle" fill="#E6FFFF" font-size="30" font-family="Arial, sans-serif" font-weight="700">BEYOND BOUND</text>
    <text x="180" y="352" text-anchor="middle" fill="#F5FFFE" font-size="58" font-family="Georgia, serif" font-weight="700">Glycomics</text>
    <text x="180" y="398" text-anchor="middle" fill="#E6FFFF" font-size="24" font-family="Arial, sans-serif">Natural Wellness</text>
  </g>

  <g transform="translate(530 90)" filter="url(#shadow)">
    <rect x="20" y="40" width="320" height="560" rx="48" fill="url(#glass)"/>
    <rect x="10" y="0" width="340" height="90" rx="24" fill="#3f2a22"/>
    <rect x="44" y="250" width="272" height="260" rx="24" fill="url(#label)"/>
    <text x="180" y="322" text-anchor="middle" fill="#E6FFFF" font-size="30" font-family="Arial, sans-serif" font-weight="700">BEYOND BOUND</text>
    <text x="180" y="366" text-anchor="middle" fill="#F5FFFE" font-size="58" font-family="Georgia, serif" font-weight="700">Glycomics</text>
    <text x="180" y="412" text-anchor="middle" fill="#E6FFFF" font-size="24" font-family="Arial, sans-serif">Glucose Balance</text>
  </g>

  <g transform="translate(950 110)" filter="url(#shadow)">
    <rect x="20" y="40" width="320" height="540" rx="48" fill="url(#glass)"/>
    <rect x="10" y="0" width="340" height="86" rx="24" fill="#3f2a22"/>
    <rect x="44" y="236" width="272" height="250" rx="24" fill="url(#label)"/>
    <text x="180" y="308" text-anchor="middle" fill="#E6FFFF" font-size="30" font-family="Arial, sans-serif" font-weight="700">BEYOND BOUND</text>
    <text x="180" y="352" text-anchor="middle" fill="#F5FFFE" font-size="58" font-family="Georgia, serif" font-weight="700">Glycomics</text>
    <text x="180" y="398" text-anchor="middle" fill="#E6FFFF" font-size="24" font-family="Arial, sans-serif">Herbal Formula</text>
  </g>
</svg>
